<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Telescope reticle mark -->
  <circle cx="30" cy="30" r="22" stroke="white" stroke-width="2.2"/>
  <circle cx="30" cy="30" r="10" stroke="white" stroke-width="1.8"/>
  <!-- Crosshair arms -->
  <line x1="8" y1="30" x2="18" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="30" x2="52" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="8" x2="30" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="42" x2="30" y2="52" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Centre dot — Synozur purple -->
  <circle cx="30" cy="30" r="3.5" fill="#9333ea"/>
  <!-- Subtle star-trail arcs top-right -->
  <path d="M 46 14 Q 54 8 60 4" stroke="#9333ea" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 50 18 Q 58 13 65 10" stroke="#9333ea" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 48 10 Q 55 5 60 1" stroke="#9333ea" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Wordmark -->
  <text
    x="72" y="37"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="3"
    fill="white"
  >PALOMAR</text>

  <!-- Tagline -->
  <text
    x="73" y="52"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="2.5"
    fill="rgba(255,255,255,0.5)"
  >BY SYNOZUR</text>
</svg>
